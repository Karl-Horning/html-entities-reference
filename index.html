<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>HTML Entities Reference</title>
    <meta
      name="description"
      content="A searchable reference for HTML named character references. Filter by name, decimal code, hex code, or Unicode description, then click to copy."
    />
    <meta name="author" content="Karl Horning" />
    <link
      rel="canonical"
      href="https://www.karlhorning.dev/html-entities-reference/"
    />

    <!-- Theme -->
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%BASE_URL%favicon/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%BASE_URL%favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="%BASE_URL%favicon/favicon-96x96.png"
    />
    <link rel="shortcut icon" href="%BASE_URL%favicon/favicon.ico" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon/apple-icon.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%BASE_URL%favicon/apple-icon-180x180.png"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://www.karlhorning.dev/html-entities-reference/"
    />
    <meta property="og:site_name" content="Karl Horning" />
    <meta property="og:title" content="HTML Entities Reference" />
    <meta
      property="og:description"
      content="A searchable reference for HTML named character references. Filter by name, decimal code, hex code, or Unicode description, then click to copy."
    />
    <meta property="og:locale" content="en_GB" />
    <meta
      property="og:image"
      content="https://www.karlhorning.dev/html-entities-reference/preview-image.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HTML Entities Reference" />
    <meta
      name="twitter:description"
      content="A searchable reference for HTML named character references. Filter by name, decimal code, hex code, or Unicode description, then click to copy."
    />
    <meta
      name="twitter:image"
      content="https://www.karlhorning.dev/html-entities-reference/preview-image.png"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
